<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Homly — El CRM inmobiliario que entiende a quién le vendes</title>
<meta name="description" content="Homly es el CRM inmobiliario inteligente: matching propiedad-cliente, perfil familiar, agenda de visitas y analítica de conversión. Para agencias y agentes que cierran más.">
<meta name="theme-color" content="#FFFFFF">
<meta property="og:title" content="Homly — CRM Inmobiliario Inteligente">
<meta property="og:description" content="Matching inteligente propiedad-cliente, perfil familiar y analítica de conversión para agencias inmobiliarias.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://homly.world">
<link rel="icon" type="image/png" href="/icono_homly.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
<script type="importmap">
{ "imports": { "homly": "https://cdn.jsdelivr.net/gh/softronicve/homly-framework@v1.8.3/homly.js" } }
</script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&family=Nunito+Sans:wght@400;600;700;800;900&family=Spline+Sans+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  /* Tokens y primitivas compartidas. El estilo de cada sección vive en su
     propio archivo .css, aislado con @scope. */
  :root{
    --paper:#FFFFFF; --paper-2:#F7F7F8; --ink:#231F20; --ink-soft:#434345;
    --clay:#F05223; --clay-deep:#B23A0B; --clay-ink:#B23A0B; --pine:#2B414E;
    --gold:#FFCD33; --line:rgba(35,31,32,.14);
    --max:1280px;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html{scroll-behavior:smooth;-webkit-text-size-adjust:100%}
  body{
    background:var(--paper);color:var(--ink);
    font-family:"Manrope",system-ui,sans-serif;font-weight:400;
    font-size:clamp(16px,1.05vw,18px);line-height:1.6;
    -webkit-font-smoothing:antialiased;overflow-x:clip;
  }
  h1,h2,h3,.display{font-family:"Nunito Sans",sans-serif;font-weight:400;line-height:1.02;letter-spacing:-.02em}
  a{color:inherit;text-decoration:none}
  .wrap{max-width:var(--max);margin:0 auto;padding:0 clamp(20px,5vw,72px)}
  .mono{font-family:"Spline Sans Mono",monospace;font-weight:500;letter-spacing:.08em;text-transform:uppercase;font-size:.72rem}
  .idx{font-family:"Spline Sans Mono",monospace;color:var(--clay-ink);font-size:.78rem;letter-spacing:.1em}

  .btn{display:inline-flex;align-items:center;gap:9px;padding:13px 24px;font-size:.9rem;
    font-weight:500;border-radius:2px;transition:.25s ease;cursor:pointer;
    border:1px solid var(--ink);font-family:inherit;background:transparent;color:var(--ink)}
  .btn-fill{background:var(--ink);color:var(--paper)}
  .btn-fill:hover{background:var(--clay-ink);border-color:var(--clay-ink);transform:translateY(-2px)}
  .btn-ghost:hover{background:var(--ink);color:var(--paper)}
  /* Estado de carga que gestiona homly.js (clase is-loading + disabled). */
  .btn:disabled{opacity:.65;cursor:default;transform:none}
  .btn.is-loading{cursor:progress;pointer-events:none}
  .btn.is-loading::after{content:"";width:14px;height:14px;border:2px solid currentColor;
    border-right-color:transparent;border-radius:50%;animation:btn-spin .6s linear infinite}
  @keyframes btn-spin{to{transform:rotate(360deg)}}

  /* Hydration barrier (modo normal): el contenido de app-root se revela entero al
     estar listo (evita el stagger), mientras un spinner CSS marca la espera. En
     dist/ (prerenderizado) data-hydration-ready ya está puesto y la barrera no espera. */
  #app-root{opacity:0;transition:opacity .4s ease}
  :root[data-hydration-ready] #app-root{opacity:1}
  #hydration-spinner{position:fixed;top:55%;left:50%;width:34px;height:34px;
    margin:-17px 0 0 -17px;border:3px solid var(--line);border-top-color:var(--clay);
    border-radius:50%;animation:btn-spin .7s linear infinite;z-index:50;
    transition:opacity .3s ease}
  :root[data-hydration-ready] #hydration-spinner{opacity:0;pointer-events:none}

  .eyebrow{display:inline-flex;align-items:center;gap:12px;margin-bottom:30px}
  .eyebrow::before{content:"";width:46px;height:1px;background:var(--clay)}

  section{padding:clamp(80px,12vh,140px) 0;position:relative}
  .sec-head{display:flex;justify-content:space-between;align-items:flex-end;gap:40px;
    margin-bottom:70px;padding-bottom:26px;border-bottom:1px solid var(--ink)}
  .sec-head h2{font-size:clamp(2rem,4.4vw,3.6rem);max-width:16ch}
  .sec-head p{max-width:34ch;color:var(--ink-soft);font-size:1rem}

  .reveal{opacity:0;transform:translateY(34px);transition:opacity 1s ease,transform 1s cubic-bezier(.2,.8,.2,1)}
  .reveal.in{opacity:1;transform:none}

  .logo{display:flex;align-items:center;gap:12px;font-family:"Nunito Sans",sans-serif;font-size:1.5rem;font-weight:600;letter-spacing:-.03em}
  .logo-full{height:42px;width:auto;display:block}
  .logo-icon{width:30px;height:30px;flex:none;border-radius:50%}

  #app-root{display:block}

  @media(max-width:900px){
    .sec-head{flex-direction:column;align-items:flex-start}
  }
</style>
</head>
<body>

<!-- nav y hero son componentes: renderizan de sus archivos (nav.html/.css, hero.html/.css).
     El prerender los hornea en dist/index.html para el first-paint; este es el modo normal. -->
<homly-nav></homly-nav>

<homly-hero></homly-hero>

<div id="app-root"></div>
<div id="hydration-spinner" aria-hidden="true"></div>
<noscript><style>#app-root{opacity:1!important}#hydration-spinner{display:none}</style></noscript>

<script type="module" src="/js/app.js?v=1.8.3-2"></script>
</body>
</html>
